<div class="row justify-content-center">
    <div class="col-lg-10">
        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Record Purchase Entry</h5>
            </div>
            <div class="admin-form-section-body">

                <!-- ── Purchase Header ─────────────────── -->
                <div class="form-row-admin form-row-3">
                    <div class="form-group-admin">
                        <label class="form-label-admin" for="purchase-supplier">Select Supplier</label>
                        <select id="purchase-supplier" class="form-select-admin">
                            <option value="">Loading suppliers...</option>
                        </select>
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin" for="purchase-invoice">Invoice Number</label>
                        <input type="text" id="purchase-invoice" class="form-control-admin"
                            placeholder="e.g. INV-2026-001">
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin" for="purchase-date">Purchase Date</label>
                        <input type="date" id="purchase-date" class="form-control-admin">
                    </div>
                </div>

                <div class="section-divider"></div>

                <!-- ── Purchase Items ──────────────────── -->
                <h6 class="mb-3 fw-600 fs-13">Purchase Items</h6>

                <div id="items-container">
                    <!-- Item rows are injected here by JS -->
                </div>

                <div id="purchase-error" class="mt-2"
                    style="color: #e74c3c; font-size: 13px; display: none;"></div>

                <button type="button" id="add-item-btn" class="btn-admin-outline btn-admin-sm mt-3">
                    + Add Another Item
                </button>

                <!-- ── Grand Total ─────────────────────── -->
                <div class="mt-4"
                    style="display: flex; justify-content: flex-end; align-items: center; gap: 16px;">
                    <span class="fw-600 fs-14">Grand Total:</span>
                    <span id="grand-total-display"
                        style="font-size: 18px; font-weight: 700; color: #2c3e50;">₹0.00</span>
                </div>

                <!-- ── Actions ─────────────────────────── -->
                <div class="form-actions mt-5">
                    <a href="#" class="btn-admin-outline" data-page="purchases.html">Cancel</a>
                    <button type="button" id="submit-purchase-btn" class="btn-admin-primary">
                        Submit Purchase Entry
                    </button>
                </div>

            </div>
        </section>
    </div>
</div>
