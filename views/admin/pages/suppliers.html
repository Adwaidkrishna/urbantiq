<div class="row g-4">
    <div class="col-lg-12">
        <section class="admin-form-section mb-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Enlist New Supplier</h5>
            </div>
            <div class="admin-form-section-body">
                <form action="#" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label-admin">Supplier Name</label>
                        <input type="text" class="form-control-admin" placeholder="e.g. Global Logistics Ltd.">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-admin">Contact Person</label>
                        <input type="text" class="form-control-admin" placeholder="Jane Doe">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-admin">Company Name</label>
                        <input type="text" class="form-control-admin" placeholder="e.g. Acme Corp">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn-admin-primary w-100">Enlist</button>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div class="col-lg-12">
        <div class="admin-card">
            <div class="admin-card-header">
                <h3 class="admin-card-title">Enlisted Suppliers</h3>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Supplier Name</th>
                            <th>Contact Person</th>
                            <th>Company Name</th>
                            <th>Total Purchases</th>
                            <th>Status</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-600">Global Logistics Ltd.</td>
                            <td>Jane Doe</td>
                            <td class="td-secondary">jane@global.com</td>
                            <td>$12,450 (4 Purchases)</td>
                            <td><span class="status-badge badge-active">Active</span></td>
                            <td>
                                <div class="action-btns justify-content-end">
                                    <button class="btn-admin-outline btn-admin-icon" title="Edit"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg></button>
                                    <button class="btn-admin-danger btn-admin-icon" title="Delete"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                        </svg></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="fw-600">Urban Fabrics Co.</td>
                            <td>Mark Chen</td>
                            <td class="td-secondary">mark@urbanfabrics.com</td>
                            <td>$8,200 (2 Purchases)</td>
                            <td><span class="status-badge badge-active">Active</span></td>
                            <td>
                                <div class="action-btns justify-content-end">
                                    <button class="btn-admin-outline btn-admin-icon" title="Edit"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg></button>
                                    <button class="btn-admin-danger btn-admin-icon" title="Delete"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                        </svg></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
