<div class="row g-4">
    <div class="col-lg-5">
        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Generate New Coupon</h5>
            </div>
            <div class="admin-form-section-body">
                <form action="#">
                    <div class="form-group-admin">
                        <label class="form-label-admin">Coupon Code</label>
                        <input type="text" class="form-control-admin" placeholder="e.g. URBAN20">
                    </div>
                    <div class="form-row-admin form-row-2">
                        <div class="form-group-admin">
                            <label class="form-label-admin">Discount Type</label>
                            <select class="form-select-admin">
                                <option>Percentage (%)</option>
                                <option>Fixed Amount ($)</option>
                            </select>
                        </div>
                        <div class="form-group-admin">
                            <label class="form-label-admin">Value</label>
                            <input type="number" class="form-control-admin" placeholder="20">
                        </div>
                    </div>
                    <div class="form-row-admin form-row-2">
                        <div class="form-group-admin">
                            <label class="form-label-admin">Usage Limit</label>
                            <input type="number" class="form-control-admin" placeholder="100">
                        </div>
                        <div class="form-group-admin">
                            <label class="form-label-admin">Expiry Date</label>
                            <input type="date" class="form-control-admin">
                        </div>
                    </div>
                    <button type="submit" class="btn-admin-primary w-100 mt-3">Create Coupon</button>
                </form>
            </div>
        </section>
    </div>
    <div class="col-lg-7">
        <div class="admin-card">
            <div class="admin-card-header">
                <h3 class="admin-card-title">Existing Coupons</h3>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Discount</th>
                            <th>Usage</th>
                            <th>Expiry</th>
                            <th>Status</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-600">NEWUSER10</td>
                            <td>10% OFF</td>
                            <td>45/100</td>
                            <td class="td-secondary">31 Dec, 2023</td>
                            <td><span class="status-badge badge-active">Active</span></td>
                            <td>
                                <div class="action-btns justify-content-end">
                                    <button class="btn-admin-outline btn-admin-icon" title="Edit"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        </svg></button>
                                    <button class="btn-admin-danger btn-admin-icon" title="Delete"><svg
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                        </svg></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="fw-600">SUMMER25</td>
                            <td>25% OFF</td>
                            <td>120/500</td>
                            <td class="td-secondary">30 Sep, 2023</td>
                            <td><span class="status-badge badge-cancelled">Expired</span></td>
                            <td>
                                <div class="action-btns justify-content-end">
                                    <button class="btn-admin-danger btn-admin-icon"><svg viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                        </svg></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
