<div class="row justify-content-center">
    <div class="col-lg-8">
        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Update Stock Level</h5>
            </div>
            <div class="admin-form-section-body">
                <form action="#">
                    <div class="form-group-admin">
                        <label class="form-label-admin">Select Product</label>
                        <select class="form-select-admin">
                            <option>Premium Cotton Tee (M - White)</option>
                            <option>Slim Fit Denim (32 - Blue)</option>
                            <option>Leather Wallet (Black)</option>
                        </select>
                    </div>
                    <div class="form-row-admin form-row-2">
                        <div class="form-group-admin">
                            <label class="form-label-admin">Update Type</label>
                            <select class="form-select-admin">
                                <option>Stock In (Addition)</option>
                                <option>Stock Out (Removal)</option>
                                <option>Stock Adjustment (Override)</option>
                            </select>
                        </div>
                        <div class="form-group-admin">
                            <label class="form-label-admin">Quantity</label>
                            <input type="number" class="form-control-admin" placeholder="0">
                        </div>
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin">Reason / Remark</label>
                        <input type="text" class="form-control-admin"
                            placeholder="Restock from purchase record #PUR-102">
                    </div>
                    <div class="form-actions mt-4 text-center">
                        <button type="submit" class="btn-admin-primary w-100">Apply Update</button>
                        <a href="#" class="d-block mt-3 text-decoration-none fs-13" style="color: #6B7280;"
                            data-page="inventory.html">Back to Inventory View</a>
                    </div>
                </form>
            </div>
        </section>
    </div>
</div>
