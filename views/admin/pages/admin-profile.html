<div class="row g-4">
    <div class="col-lg-6">
        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Personal Information</h5>
            </div>
            <div class="admin-form-section-body">
                <form action="#">
                    <div class="form-group-admin text-center mb-4">
                        <div class="mx-auto mb-3"
                            style="width: 80px; height: 80px; background-color: #000; color: #fff; font-size: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                            AD</div>
                        <button type="button" class="btn-admin-outline btn-admin-sm">Change Avatar</button>
                    </div>
                    <div class="form-row-admin form-row-2">
                        <div class="form-group-admin">
                            <label class="form-label-admin">Full Name</label>
                            <input type="text" class="form-control-admin" value="Adwaid S.">
                        </div>
                        <div class="form-group-admin">
                            <label class="form-label-admin">Email Address</label>
                            <input type="email" class="form-control-admin" value="adwaid@urbantiq.com">
                        </div>
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin">Mobile Number</label>
                        <input type="text" class="form-control-admin" value="+1 555-010-9900">
                    </div>
                    <button type="submit" class="btn-admin-primary mt-3">Update Profile</button>
                </form>
            </div>
        </section>
    </div>
    <div class="col-lg-6">
        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h5 class="admin-form-section-title">Account Security</h5>
            </div>
            <div class="admin-form-section-body">
                <form action="#">
                    <div class="form-group-admin text-center mb-4">
                        <div class="p-4 rounded-3 fs-13"
                            style="background: #F9FAFB; color: #6B7280; border: 1px solid #E5E7EB;">
                            We recommend changing your password regularly to keep your account secure.
                        </div>
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin">Current Password</label>
                        <input type="password" class="form-control-admin" placeholder="••••••••">
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin">New Password</label>
                        <input type="password" class="form-control-admin" placeholder="New strong password">
                    </div>
                    <div class="form-group-admin">
                        <label class="form-label-admin">Confirm Password</label>
                        <input type="password" class="form-control-admin" placeholder="Repeat new password">
                    </div>
                    <button type="submit" class="btn-admin-primary mt-3">Update Security</button>
                </form>
            </div>
        </section>
    </div>
</div>
