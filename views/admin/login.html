<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="../../public/css/admin.css">
</head>

<body class="admin-login-page">

    <div class="admin-login-card">
        <div class="text-center mb-5">
            <h1 class="fw-bold mb-2" style="font-size: 1.75rem; letter-spacing: 2px;">URBANTIQ</h1>
            <p class="text-muted small mb-0">ADMIN PORTAL</p>
        </div>

        <form id="adminLoginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Admin Email</label>
                <input type="email" class="form-control" placeholder="admin@urbantiq.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn"
                class="btn btn-dark w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2">
                <span id="btnText">Login to Dashboard</span>
                <div id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </button>
        </form>
    </div>

    <!-- Admin Logic -->
    <script src="../../public/js/admin.js"></script>

</body>

</html>
