<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | URBANTIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/checkout.css">
</head>

<body style="background-color: #f5f5f7; min-height: 100vh; display: flex; flex-direction: column;">

    <nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-800" href="/">URBANTIQ</a>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1 d-flex align-items-center">
        <div class="success-hero">
            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            
            <h1 class="fw-800 mb-2">Order Confirmed!</h1>
            <p class="text-secondary mb-0">We have received your order and are starting to prepare it.</p>
            
            <div class="order-id-badge" id="orderIdDisplay">#ORD-LOADING...</div>
            
            <p class="delivery-msg" id="deliveryMsg">Your package is expected to arrive by <span class="fw-700">Tue, 2nd April</span>.</p>

            <div class="action-btns-success">
                <a href="/account-orders" class="btn-view-order">View Order History</a>
                <a href="/product" class="btn-shop">Back to Shop</a>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-3 mt-auto">
        <div class="container text-center">
            <small class="text-muted">&copy; 2026 URBANTIQ. All rights reserved.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/success.js"></script>
</body>

</html>
