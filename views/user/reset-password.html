<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Auth CSS -->
    <link rel="stylesheet" href="../../public/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <!-- Left Side — Image -->
        <div class="auth-image-side">
            <img src="../../public/images/user/auth-bg.png" alt="Fashion background" class="auth-bg-img">
            <div class="auth-brand-overlay">
                <h1>URBANTIQ</h1>
                <p>New password, new beginnings. Set a strong password to protect your style profile.</p>
            </div>
        </div>

        <!-- Right Side — Form -->
        <div class="auth-form-side">
            <div class="auth-container">
                <h2 class="auth-title">Reset Password</h2>
                <p class="auth-subtitle">Choose a new, secure password for your URBANTIQ account.</p>

                <form class="auth-form" action="login.html">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••"
                            required>
                    </div>

                    <button type="submit" class="btn-auth-primary">Update Password</button>
                </form>

                <p class="auth-footnote">
                    Wait, I remember now! <a href="login.html">Back to Login</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
