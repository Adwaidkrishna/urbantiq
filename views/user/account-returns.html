<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returns | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/account.css">
</head>

<body class="account-body">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">URBANTIQ</a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/product">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Signup</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="search-container d-none d-lg-flex">
                    <i class="bi bi-search text-muted me-2" style="font-size: 1rem;"></i>
                    <input type="text" class="search-input" placeholder="Search products...">
                </div>
                <div class="d-flex align-items-center gap-2">
                    <a href="/wishlist" class="icon-btn" title="Wishlist">
                        <i class="bi bi-heart"></i>
                    </a>
                    <a href="/cart" class="icon-btn" title="Cart">
                        <i class="bi bi-cart3"></i>
                        <span class="cart-badge">0</span>
                    </a>
                    <a href="/account" class="icon-btn active-nav-icon" title="Profile">
                        <i class="bi bi-person"></i>
                    </a>
                </div>
                <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="account-page-wrap">
        <div class="container">
            <div class="account-container">

                <div class="mb-4">
                    <a href="/account" class="text-decoration-none text-muted small fw-bold">
                        <i class="bi bi-chevron-left me-1"></i> Back to Account
                    </a>
                </div>

                <h1 class="profile-name mb-2">Returns</h1>
                <p class="text-muted small mb-5" id="returnCount">Loading returns...</p>

                <div class="account-stack" id="returnList">
                    <!-- Dynamic returns will be injected here -->
                    <div class="text-center py-5" id="returnsLoading">
                        <div class="spinner-border text-dark" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-3 text-start">
                    <a href="/" class="footer-logo">URBANTIQ</a>
                    <p class="footer-desc">Premium men’s fashion for the modern generation. Engineering style with clinical precision.</p>
                </div>
            </div>
            <div class="footer-bottom d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="copyright">&copy; 2026 URBANTIQ. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/returns.js"></script>
</body>
</html>
