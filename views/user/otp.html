<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Auth CSS -->
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <!-- Left Side — Image -->
        <div class="auth-image-side">
            <img src="/images/user/auth-bg.png" alt="Fashion background" class="auth-bg-img">
            <div class="auth-brand-overlay">
                <h1>URBANTIQ</h1>
                <p>One step closer to your curated collection. Verify your account to get started.</p>
            </div>
        </div>

        <!-- Right Side — Form -->
        <div class="auth-form-side">
            <div class="auth-container text-center">
                <h2 class="auth-title">Verify Your Email</h2>
                <p class="auth-subtitle">Enter the 6-digit verification code sent to your email address.</p>

                <form class="auth-form" action="/api/users/verify-otp" method="POST">

                    <!-- hidden email -->
                    <input type="hidden" name="email" id="email">

                    <!-- hidden OTP -->
                    <input type="hidden" name="otp" id="otp">

                    <div class="otp-inputs">
                        <input type="text" class="otp-field" maxlength="1" required>
                        <input type="text" class="otp-field" maxlength="1" required>
                        <input type="text" class="otp-field" maxlength="1" required>
                        <input type="text" class="otp-field" maxlength="1" required>
                        <input type="text" class="otp-field" maxlength="1" required>
                        <input type="text" class="otp-field" maxlength="1" required>
                    </div>

                    <button type="submit" class="btn-auth-primary">
                        Verify Email
                    </button>

                </form>

                <p class="auth-footnote">
                    Didn't receive a code? <a href="#" class="auth-link">Resend Code</a>
                </p>
                <div class="mt-4">
                    <a href="signup.html" class="auth-link small text-muted">
                        <i class="bi bi-arrow-left"></i> Back to Sign Up
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/form.js"></script>
</body>

</html>
