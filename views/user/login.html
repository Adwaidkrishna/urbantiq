<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Auth CSS -->
    <link rel="stylesheet" href="../../public/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <!-- Left Side — Image -->
        <div class="auth-image-side">
            <img src="../../public/images/user/auth-bg.png" alt="Fashion background" class="auth-bg-img">
            <div class="auth-brand-overlay">
                <h1>URBANTIQ</h1>
                <p>Verify your email to continue your style journey. Experience the fusion of engineering precision and
                    contemporary elegance.</p>
            </div>
        </div>

        <!-- Right Side — Form -->
        <div class="auth-form-side">
            <div class="auth-container">
                <div class="mb-2">
                    <a href="home.html" class="text-decoration-none text-black fw-bold small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Home
                    </a>
                </div>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to continue your style journey.</p>

                <form class="auth-form" id="userLoginForm" onsubmit="handleUserLogin(event)">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label">Password</label>
                            <a href="forgot-password.html" class="auth-link">Forgot password?</a>
                        </div>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>

                    <button type="submit" id="userLoginBtn"
                        class="btn-auth-primary d-flex align-items-center justify-content-center gap-2">
                        <span id="userBtnText">Sign In</span>
                        <div id="userBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </button>

                    <div class="auth-divider">OR</div>

                    <button type="button" class="btn-auth-outline">
                        <i class="bi bi-google"></i>
                        Continue with Google
                    </button>
                </form>

                <p class="auth-footnote">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function handleUserLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('userLoginBtn');
            const btnText = document.getElementById('userBtnText');
            const btnSpinner = document.getElementById('userBtnSpinner');

            btn.disabled = true;
            btnText.textContent = 'Signing in...';
            btnSpinner.classList.remove('d-none');

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 800);
        }
    </script>

</body>

</html>
