<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | URBANTIQ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FIXED PATH --> 
    <link rel="stylesheet" href="/css/auth.css">

</head>

<body class="auth-body">

    <div class="auth-wrapper">

        <!-- LEFT SIDE -->
        <div class="auth-image-side">

            <img src="/images/user/auth-bg.png" class="auth-bg-img" alt="fashion">

            <div class="auth-brand-overlay">

                <h1>URBANTIQ</h1>

                <p>
                    Verify your email to continue your style journey. Experience the fusion
                    of engineering precision and contemporary elegance.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="auth-form-side">

            <div class="auth-container">

                <div class="mb-2">

                    <a href="/" class="text-decoration-none text-black fw-bold small">

                        <i class="bi bi-arrow-left me-1"></i>
                        Back to Home

                    </a>

                </div>

                <h2 class="auth-title">Welcome Back</h2>

                <p class="auth-subtitle">
                    Sign in to continue your style journey.
                </p>

                <form id="userLoginForm" class="auth-form">

                    <div class="mb-3">

                        <label class="form-label">Email address</label>

                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>

                    </div>

                    <div class="mb-3">

                        <div class="d-flex justify-content-between">

                            <label class="form-label">Password</label>

                            <a href="/forgot-password" class="auth-link">
                                Forgot password?
                            </a>

                        </div>

                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>

                    </div>

                    <div id="loginError" class="alert alert-danger d-none"></div>

                    <button type="submit" id="userLoginBtn"
                        class="btn-auth-primary d-flex align-items-center justify-content-center gap-2">

                        <span id="userBtnText">Sign In</span>

                        <div id="userBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status">

                            <span class="visually-hidden">Loading...</span>

                        </div>

                    </button>

                    <div class="auth-divider">OR</div>

                    <button type="button" class="btn-auth-outline">

                        <i class="bi bi-google"></i>
                        Continue with Google

                    </button>

                </form>

                <p class="auth-footnote">

                    Don't have an account?
                    <a href="/register">Sign Up</a>

                </p>

            </div>

        </div>

    </div>

    <!-- LOGIN JS -->
    <script src="/js/login.js"></script>

</body>

</html>
