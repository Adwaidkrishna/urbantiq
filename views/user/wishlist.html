<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | URBANTIQ</title>
    <meta name="description" content="Your saved items on URBANTIQ — premium men's fashion.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/wishlist.css">
</head>

<body>

    <!-- ══ NAVBAR ══════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">URBANTIQ</a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/product">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Signup</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="search-container d-none d-lg-flex">
                    <i class="bi bi-search text-muted me-2" style="font-size:1rem;"></i>
                    <input type="text" class="search-input" placeholder="Search products...">
                </div>
                <div class="d-flex align-items-center gap-2">
                    <a href="/wishlist" class="icon-btn wl-nav-active" title="Wishlist">
                        <i class="bi bi-heart-fill"></i>
                        <span class="wishlist-badge">0</span>
                    </a>
                    <a href="/cart" class="icon-btn" title="Cart">
                        <i class="bi bi-cart3"></i>
                        <span class="cart-badge">0</span>
                    </a>
                    <a href="/account" class="icon-btn" title="Profile">
                        <i class="bi bi-person"></i>
                    </a>
                </div>
                <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ══ PAGE HEADER ═════════════════════════════════════════ -->
    <div class="wl-header-wrap">
        <div class="container">
            <!-- Breadcrumb -->
            <nav class="wl-breadcrumb">
                <a href="/">Home</a>
                <i class="bi bi-chevron-right"></i>
                <span>Wishlist</span>
            </nav>
            <!-- Title row -->
            <div class="wl-title-row">
                <div>
                    <h1 class="wl-title">My Wishlist</h1>
                    <p class="wl-subtitle">Saved items for later</p>
                </div>
                <div class="wl-count-badge" id="wishlistCount">0 items</div>
            </div>
        </div>
    </div>

    <!-- ══ WISHLIST GRID ════════════════════════════════════════ -->
    <section class="wl-section" id="wishlistSection">
        <div class="container">
            <div class="row g-3 g-md-4" id="wishlistGrid">
                <!-- Content will be injected by wishlist.js -->
                <div class="text-center py-5" id="wishlistLoading">
                    <div class="spinner-border text-dark" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ══ EMPTY STATE ══════════════════════════════════════════ -->
    <div class="wl-empty-wrap d-none" id="emptyState">
        <div class="container">
            <div class="wl-empty-card">
                <div class="wl-empty-icon text-center">
                    <i class="bi bi-heart" style="font-size: 3rem; color: #ccc;"></i>
                </div>
                <h2 class="wl-empty-title text-center mt-3">Your wishlist is empty</h2>
                <p class="wl-empty-sub text-center">Save items you love to find them here.</p>
                <div class="text-center">
                    <a href="/product" class="wl-empty-btn btn btn-dark mt-3">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="copyright text-center py-4">&copy; 2026 URBANTIQ. All rights reserved.</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/wishlist.js"></script>

</body>
</html>
