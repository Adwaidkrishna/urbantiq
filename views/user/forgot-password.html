<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | URBANTIQ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Auth CSS -->
    <link rel="stylesheet" href="../../public/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <!-- Left Side — Image -->
        <div class="auth-image-side">
            <img src="../../public/images/user/auth-bg.png" alt="Fashion background" class="auth-bg-img">
            <div class="auth-brand-overlay">
                <h1>URBANTIQ</h1>
                <p>Security first. We'll help you get back to your account in just a few steps.</p>
            </div>
        </div>

        <!-- Right Side — Form -->
        <div class="auth-form-side">
            <div class="auth-container">
                <div class="mb-4">
                    <a href="login.html" class="text-decoration-none text-black fw-bold small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
                <h2 class="auth-title">Forgot Password</h2>
                <p class="auth-subtitle">Enter your email address to receive a secure password reset link.</p>

                <form class="auth-form" action="verify-otp.html">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>

                    <button type="submit" class="btn-auth-primary">Send Reset Link</button>
                </form>

                <p class="auth-footnote">
                    Suddenly remembered? <a href="login.html">Login</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
