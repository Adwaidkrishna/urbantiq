<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Payment | URBANTIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/checkout.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">URBANTIQ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/product">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center gap-2">
                <a href="/wishlist" class="icon-btn" title="Wishlist"><i class="bi bi-heart"></i></a>
                <a href="/cart" class="icon-btn" title="Cart">
                    <i class="bi bi-cart3"></i><span class="cart-badge">0</span>
                </a>
                <a href="/account" class="icon-btn" title="Profile"><i class="bi bi-person"></i></a>
                <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- PROGRESS STEPPER -->
    <div class="ck-stepper-wrap">
        <div class="container">
            <div class="ck-stepper">
                <div class="ck-step done">
                    <div class="ck-step-circle"><i class="bi bi-check"></i></div>
                    <span class="ck-step-label">Details</span>
                </div>
                <div class="ck-step-line"></div>
                <div class="ck-step done">
                    <div class="ck-step-circle"><i class="bi bi-check"></i></div>
                    <span class="ck-step-label">Summary</span>
                </div>
                <div class="ck-step-line"></div>
                <div class="ck-step active">
                    <div class="ck-step-circle">3</div>
                    <span class="ck-step-label">Payment</span>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE HEADER -->
    <div class="ck-header-wrap">
        <div class="container">
            <nav class="ck-breadcrumb">
                <a href="/">Home</a><i class="bi bi-chevron-right"></i>
                <a href="/cart">Cart</a><i class="bi bi-chevron-right"></i>
                <a href="/checkout-summary">Summary</a><i class="bi bi-chevron-right"></i>
                <span>Payment</span>
            </nav>
            <h1 class="ck-page-title">Payment</h1>
        </div>
    </div>

    <!-- MAIN -->
    <div class="ck-main">
        <div class="container">
            <div class="row g-4 align-items-start justify-content-center">

                <!-- LEFT — Payment Options -->
                <div class="col-12 col-lg-7">
                    <div class="ck-card ck-payment-card">
                        <div class="ck-card-title">Choose Payment Method</div>

                        <div class="ck-payment-list">
                            <!-- UPI -->
                            <label class="ck-payment-option selected" id="opt-upi">
                                <input type="radio" name="payMethod" value="upi" checked>
                                <div class="ck-pay-radio"></div>
                                <div class="ck-pay-icon"><i class="bi bi-phone"></i></div>
                                <div class="ck-pay-info">
                                    <div class="ck-pay-label">UPI</div>
                                    <div class="ck-pay-sub">GPay, PhonePe, Paytm, BHIM</div>
                                </div>
                            </label>

                            <!-- COD -->
                            <label class="ck-payment-option" id="opt-cod">
                                <input type="radio" name="payMethod" value="cod">
                                <div class="ck-pay-radio"></div>
                                <div class="ck-pay-icon"><i class="bi bi-cash-stack"></i></div>
                                <div class="ck-pay-info">
                                    <div class="ck-pay-label">Cash on Delivery</div>
                                    <div class="ck-pay-sub">Pay when your order arrives</div>
                                </div>
                            </label>
                        </div>

                        <div class="ck-secure-note">
                            <i class="bi bi-shield-lock-fill"></i>
                            Payments are 100% encrypted and secure
                        </div>

                        <a href="/order-success" class="ck-action-btn mt-4">
                            Pay <span id="payNowAmount">₹0</span> <i class="bi bi-lock-fill"></i>
                        </a>
                    </div>
                </div>

                <!-- RIGHT — Mini Cart Summary -->
                <div class="col-12 col-lg-5 col-xl-4">
                    <div class="ck-mini-summary-card">
                        <div class="ck-mini-summary-title">Order Summary</div>
                        
                        <div id="miniSummaryList">
                            <!-- Populated dynamically -->
                        </div>

                        <div class="ck-mini-divider"></div>
                        
                        <div class="ck-mini-price-details">
                            <div class="ck-price-row"><span>Subtotal</span><span id="miniSubtotal">₹0</span></div>
                            <div class="ck-price-row"><span>Discount</span><span id="miniDiscount" class="text-success">−₹0</span></div>
                            <div class="ck-price-row"><span>Delivery</span><span class="text-success">FREE</span></div>
                        </div>

                        <div class="ck-mini-divider"></div>

                        <div class="ck-mini-total-row">
                            <span>Total to Pay</span>
                            <span id="finalPaymentTotal">₹0</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <div class="footer-bottom d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="copyright">&copy; 2026 URBANTIQ. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/checkout.js"></script>
</body>

</html>
