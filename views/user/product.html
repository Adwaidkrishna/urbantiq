<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | URBANTIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/product.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand" href="/">URBANTIQ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/product">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Signup</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="search-container d-none d-lg-flex">
                    <i class="bi bi-search text-muted me-2"></i>
                    <input type="text" class="search-input" placeholder="Search products...">
                </div>
                <a href="/wishlist" class="icon-btn" title="Wishlist">
                    <i class="bi bi-heart"></i>
                    <span class="wishlist-badge">0</span>
                </a>
                <a href="/cart" class="icon-btn" title="Cart">
                    <i class="bi bi-cart3"></i>
                    <span class="cart-badge">0</span>
                </a>
                <a href="/account" class="icon-btn" title="Profile"><i class="bi bi-person"></i></a>
                <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Shop Layout -->
    <div class="shop-wrapper container-fluid px-4 px-lg-5">

        <!-- Breadcrumb + Title Row -->
        <div class="shop-title-row">
            <div>
                <div class="breadcrumb-custom">
                    <a href="/">Home</a>
                    <i class="bi bi-chevron-right"></i>
                    <span class="active">All Products</span>
                </div>
                <h1 class="collections-title">Collections</h1>
            </div>
            <div class="sort-row">
                <span class="sort-label">Sort:</span>
                <select class="sort-select" id="sortSelect">
                    <option>Most Popular</option>
                    <option>Newest First</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                    <option>Top Rated</option>
                </select>
            </div>
        </div>

        <!-- Content Row: Sidebar + Grid -->
        <div class="shop-content-row">

            <!-- ====== FILTER SIDEBAR ====== -->
            <aside class="filter-sidebar" id="filterSidebar">
                <div class="filter-section">
                    <div class="filter-label">CATEGORIES</div>
                    <ul class="filter-list" id="categoryFilterList"></ul>
                </div>
                <div class="filter-section">
                    <div class="filter-label">PRICE RANGE</div>
                    <input type="range" class="price-slider" id="priceSlider" min="0" max="5000" value="5000" step="100">
                    <div class="d-flex justify-content-between"><span>₹0</span><span id="priceDisplay">₹5,000</span></div>
                </div>
            </aside>

            <!-- ====== PRODUCT GRID ====== -->
            <div class="product-grid-wrap">
                <button class="mobile-filter-btn d-lg-none" id="filterToggleBtn">
                    <i class="bi bi-sliders"></i> Filters
                </button>
                <div class="row g-3 g-md-4" id="productGrid">
                    <!-- Loaded via JS -->
                </div>

                <template id="userProductTemplate">
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="p-card-anchor-wrap">
                            <a href="" class="p-card-link text-decoration-none text-reset">
                                <div class="p-card">
                                    <div class="p-card-img">
                                        <span class="p-badge p-badge-dark d-none">New</span>
                                        <img src="" alt="">
                                        <div class="p-card-actions">
                                            <button type="button" class="p-action-btn wishlist-btn" title="Add to Wishlist"><i class="bi bi-heart"></i></button>
                                            <button type="button" class="p-action-btn cart-btn" title="Add to Cart"><i class="bi bi-cart3"></i></button>
                                        </div>
                                    </div>
                                    <div class="p-card-body">
                                        <div class="p-cat"></div>
                                        <h4 class="p-name"></h4>
                                        <div class="p-price"></div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Mobile filter overlay -->
    <div class="filter-overlay" id="filterOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/product.js"></script>
</body>
</html>
