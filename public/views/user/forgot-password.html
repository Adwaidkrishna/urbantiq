<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | URBANTIQ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">

        <!-- LEFT SIDE -->
        <div class="auth-image-side">

            <img src="/images/user/auth-bg.png" class="auth-bg-img" alt="fashion">

            <div class="auth-brand-overlay">

                <h1>URBANTIQ</h1>

                <p>
                    Security first. We'll help you get back to your account in just a few steps.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="auth-form-side">

            <div class="auth-container">

                <div class="mb-3">

                    <a href="/api/auth/login" class="text-decoration-none text-black fw-bold small">

                        <i class="bi bi-arrow-left me-1"></i>
                        Back to Login

                    </a>

                </div>

                <h2 class="auth-title">Forgot Password</h2>

                <p class="auth-subtitle">
                    Enter your email address to receive a secure password reset link.
                </p>

                <form id="forgotPasswordForm" class="auth-form">

                    <div class="mb-4">

                        <label for="email" class="form-label">Email address</label>

                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>

                    </div>

                    <!-- ERROR MESSAGE -->

                    <div id="forgotError" class="alert alert-danger d-none"></div>

                    <!-- SUBMIT BUTTON -->

                    <button type="submit" id="forgotBtn"
                        class="btn-auth-primary d-flex align-items-center justify-content-center gap-2">

                        <span id="forgotBtnText">Send otp</span>

                        <span id="forgotBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status">

                            <span class="visually-hidden">Loading...</span>

                        </span>

                    </button>

                </form>

                <p class="auth-footnote">

                    Suddenly remembered?
                    <a href="/api/auth/login">Login</a>

                </p>

            </div>

        </div>

    </div>

    <script src="/js/user/forgot-password.js"></script>

</body>

</html>
