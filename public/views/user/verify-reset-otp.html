<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify Email | URBANTIQ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Auth CSS -->
    <link rel="stylesheet" href="/css/auth.css">

</head>

<body class="auth-body">

    <div class="auth-wrapper">

        <!-- LEFT SIDE -->
        <div class="auth-image-side">

            <img src="/images/user/auth-bg.png" class="auth-bg-img" alt="fashion">

            <div class="auth-brand-overlay">

                <h1>URBANTIQ</h1>

                <p>
                    One step closer to your curated collection.
                    Verify your account to get started.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="auth-form-side">

            <div class="auth-container text-center">

                <h2 class="auth-title">Verify Your Email</h2>

                <p class="auth-subtitle">
                    Enter the 6-digit verification code sent to your email address.
                </p>

                <!-- Messages -->

                <div id="otpSuccess" class="alert alert-success d-none"></div>
                <div id="otpError" class="alert alert-danger d-none"></div>
                <div id="otpInfo" class="alert alert-info d-none"></div>

                <!-- OTP FORM -->

                <form id="otpForm" class="auth-form">

                    <input type="hidden" id="emailInput">

                    <div class="otp-inputs">

                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-field" maxlength="1" inputmode="numeric">

                    </div>

                    <button type="submit" class="btn-auth-primary mt-3">
                        Verify Email
                    </button>

                </form>

                <p class="auth-footnote">

                    Didn't receive a code?
                    <a href="#" id="resendBtn" class="auth-link">
                        Resend Code
                    </a>

                </p>

                <div class="mt-4">

                    <a href="/api/auth/login" class="auth-link small text-muted">

                        <i class="bi bi-arrow-left"></i>
                        Back to Login

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- OTP JS -->
    <script src="/js/user/reset-otp.js"></script>

</body>

</html>
