<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book | URBANTIQ</title>
    <meta name="description" content="Manage your saved delivery addresses on URBANTIQ.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/account.css">
</head>

<body class="account-body">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">URBANTIQ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/product">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <a href="/wishlist" class="icon-btn" title="Wishlist"><i class="bi bi-heart"></i></a>
                    <a href="/cart" class="icon-btn" title="Cart">
                        <i class="bi bi-cart3"></i><span class="cart-badge">0</span>
                    </a>
                    <a href="/account" class="icon-btn active-nav-icon" title="Profile"><i class="bi bi-person"></i></a>
                </div>
                <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="account-page-wrap">
        <div class="container">
            <div class="account-container" style="max-width: 860px;">

                <div class="mb-4">
                    <a href="/account" class="text-decoration-none text-muted small fw-bold">
                        <i class="bi bi-chevron-left me-1"></i> Back to Account
                    </a>
                </div>

                <div class="mb-5">
                    <h1 class="profile-name mb-1">Address Book</h1>
                    <p class="text-muted small" id="addrCount">Loading your addresses...</p>
                </div>

                <!-- Address List -->
                <div class="address-list" id="addressList">
                    <div class="text-center py-5">
                        <div class="spinner-border text-dark" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

                <!-- Add New Button -->
                <div class="text-center mt-4">
                    <button class="btn-outline-black rounded-pill px-5 w-100 py-3" id="openAddModal">
                        <i class="bi bi-plus-lg me-2"></i> Add New Address
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- ── Add / Edit Address Modal ── -->
    <div class="modal fade" id="addressModal" tabindex="-1" aria-labelledby="addressModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="fw-bold mb-0" id="addressModalTitle">Add New Address</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="editAddressId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrFullName">Full Name</label>
                                <input type="text" id="addrFullName" class="ac-field" placeholder="Enter recipient name">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrPhone">Phone Number</label>
                                <input type="tel" id="addrPhone" class="ac-field" placeholder="+91 98765 43210">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="ac-input-group">
                                <label for="addrLine1">Address Line 1</label>
                                <input type="text" id="addrLine1" class="ac-field" placeholder="House no., Building name, Street">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="ac-input-group">
                                <label for="addrLine2">Address Line 2 <span class="text-muted fw-normal">(optional)</span></label>
                                <input type="text" id="addrLine2" class="ac-field" placeholder="Apartment, Landmark, Area">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrCity">City</label>
                                <input type="text" id="addrCity" class="ac-field" placeholder="Kochi">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrState">State</label>
                                <input type="text" id="addrState" class="ac-field" placeholder="Kerala">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrPincode">Pincode</label>
                                <input type="text" id="addrPincode" class="ac-field" placeholder="682 001" maxlength="6">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="ac-input-group">
                                <label for="addrLabel">Address Type</label>
                                <select id="addrLabel" class="form-select ac-field">
                                    <option value="Home">Home</option>
                                    <option value="Work">Work</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 mt-2">
                            <div class="form-check">
                                <input type="checkbox" id="addrIsDefault" class="form-check-input" style="width:18px;height:18px;border-radius:6px;">
                                <label for="addrIsDefault" class="form-check-label ms-2 fw-medium">Set as Default Address</label>
                            </div>
                            <p class="text-muted small ms-4 mt-1 mb-0">This will be auto-filled during checkout.</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="ac-btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="ac-btn-save px-5" id="saveAddressBtn">Save Address</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Delete Confirm Modal ── -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center p-4">
                <i class="bi bi-trash3 text-danger mb-3" style="font-size: 2.5rem;"></i>
                <h5 class="fw-bold mb-2">Delete Address?</h5>
                <p class="text-muted small mb-4">This address will be permanently removed from your account.</p>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger rounded-pill px-4" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom d-flex justify-content-between align-items-center py-3">
                <div class="copyright">&copy; 2026 URBANTIQ. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common/auth-guard.js"></script>
    <script src="/js/user/address.js"></script>
</body>
</html>
