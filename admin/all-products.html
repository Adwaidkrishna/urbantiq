<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/admin-common.css">
</head>

<body>

    <aside class="admin-sidebar">
        <a href="dashboard.html" class="sidebar-brand">URBANTIQ</a>
        <nav class="sidebar-nav">
            <ul class="p-0">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i>
                        Dashboard</a></li>
                <li class="nav-item"><a href="all-products.html" class="nav-link active"><i
                            class="bi bi-bag"></i> Products</a></li>
                <li class="nav-item"><a href="categories.html" class="nav-link"><i class="bi bi-layers"></i>
                        Categories</a></li>
                <li class="nav-item"><a href="order-management.html" class="nav-link"><i
                            class="bi bi-cart"></i> Orders</a></li>
                <li class="nav-item"><a href="customers.html" class="nav-link"><i class="bi bi-people"></i> Customers</a>
                </li>
            </ul>
        </nav>
    </aside>

    <header class="admin-header">
        <h5 class="fw-800 mb-0">Products</h5>
        <a href="add-product.html" class="btn btn-dark btn-sm fw-800 px-4">+ Add Product</a>
    </header>

    <main class="admin-main">
        <div class="admin-card">
            <div class="p-4 border-bottom d-flex gap-3">
                <input type="text" class="form-control form-control-sm" placeholder="Search products..."
                    style="max-width: 300px;">
                <select class="form-select form-select-sm" style="max-width: 150px;">
                    <option>All Categories</option>
                    <option>Shirts</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="d-flex align-items-center gap-3">
                                <img src="https://images.unsplash.com/photo-1617122143007-8e658933e8b0?q=80&w=100"
                                    class="rounded" width="40">
                                <span class="fw-700">Premium Tailored Suit</span>
                            </td>
                            <td>Suits</td>
                            <td>$899.00</td>
                            <td>24</td>
                            <td><span class="badge bg-success-subtle text-success border">In Stock</span></td>
                            <td>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-light btn-sm"><i data-lucide="edit-2"
                                            style="width: 14px;"></i></button>
                                    <button class="btn btn-light btn-sm text-danger"><i data-lucide="trash"
                                            style="width: 14px;"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    
    
</body>

</html>
