<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Coupon | Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/admin-common.css">
</head>

<body>

    <header class="admin-header ms-0">
        <h5 class="fw-800 mb-0">Create New Coupon</h5>
    </header>

    <main class="admin-main ms-0 container py-5">
        <div class="admin-card p-5 mx-auto" style="max-width: 600px;">
            <form>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Coupon Code</label>
                    <input type="text" class="form-control" placeholder="e.g. SUMMER50">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Discount Type</label>
                    <select class="form-select">
                        <option>Percentage (%)</option>
                        <option>Fixed Amount ($)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Value</label>
                    <input type="number" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Expiry Date</label>
                    <input type="date" class="form-control">
                </div>
                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-dark py-2 fw-800">Create Coupon</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    
    
    
</body>

</html>
