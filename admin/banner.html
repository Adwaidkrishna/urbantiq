<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banners | Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    <!-- Lucide Icons -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/admin-common.css">

<body>

    <aside class="admin-sidebar">
        <a href="dashboard.html" class="sidebar-brand">URBANTIQ</a>
    </aside>

    <header class="admin-header">
        <h5 class="fw-800 mb-0">Home Banners</h5>
        <button class="btn btn-dark btn-sm fw-800">+ Add Banner</button>

    <main class="admin-main">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="admin-card overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1490114538077-0a7f8cb49891?q=80&w=600" class="w-100"
                        style="height: 200px; object-fit: cover;">
                    <div class="p-3 d-flex justify-content-between align-items-center">

                            <h6 class="fw-800 mb-0">Spring Collection 2026</h6>
                            <p class="small text-muted mb-0 text-truncate" style="max-width: 200px;">Elevate your style
                                with new arrivals.</p>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" checked>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
