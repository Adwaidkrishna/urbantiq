<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/admin-common.css">
</head>

<body>

    <aside class="admin-sidebar">
        <a href="dashboard.html" class="sidebar-brand">URBANTIQ</a>
        <nav class="sidebar-nav">
            <ul class="p-0">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i>
                        Dashboard</a></li>
                <li class="nav-item"><a href="all-products.html" class="nav-link active"><i
                            class="bi bi-bag"></i> Products</a></li>
            </ul>
        </nav>
    </aside>

    <header class="admin-header">
        <h5 class="fw-800 mb-0">Add New Product</h5>
        <div class="d-flex gap-2">
            <a href="all-products.html" class="btn btn-light btn-sm fw-700">Cancel</a>
            <button class="btn btn-dark btn-sm fw-800 px-4">Publish Product</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="admin-card p-4 mb-4">
                    <h6 class="fw-800 mb-4">Basic Information</h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Product Title</label>
                        <input type="text" class="form-control" placeholder="e.g. Premium White Shirt">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Description</label>
                        <textarea class="form-control" rows="6" placeholder="Describe your product..."></textarea>
                    </div>
                </div>

                <div class="admin-card p-4">
                    <h6 class="fw-800 mb-4">Media</h6>
                    <div class="border-dashed p-5 text-center rounded-3 bg-light" style="border: 2px dashed #e5e7eb;">
                        <i data-lucide="upload-cloud" class="mb-3 text-muted" style="width: 48px; height: 48px;"></i>
                        <p class="mb-0 fw-600">Click to upload or drag and drop</p>
                        <p class="small text-muted">PNG, JPG up to 10MB</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="admin-card p-4 mb-4">
                    <h6 class="fw-800 mb-4">Organization</h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Category</label>
                        <select class="form-select">
                            <option>Shirts</option>
                            <option>Jeans</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Brand</label>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="admin-card p-4">
                    <h6 class="fw-800 mb-4">Pricing</h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Base Price</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Stock Quantity</label>
                        <input type="number" class="form-control" placeholder="0">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    
    
</body>

</html>
