<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details | Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/admin-common.css">
</head>

<body>

    <header class="admin-header ms-0">
        <h5 class="fw-800 mb-0">Customer Profile</h5>
    </header>

    <main class="admin-main ms-0 container py-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="admin-card p-4 text-center">
                    <img src="https://ui-avatars.com/api/?name=John+Doe&size=100" class="rounded-circle mb-3">
                    <h5 class="fw-800">John Doe</h5>
                    <p class="text-muted small">Customer since Jan 2026</p>
                    <div class="d-grid mt-4">
                        <button class="btn btn-outline-danger btn-sm">Block Customer</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="admin-card p-4">
                    <h6 class="fw-800 mb-4">Total Spending: $2,450.00</h6>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Order</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#928374</td>
                                    <td>$899.00</td>
                                    <td>Delivered</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    
    
</body>

</html>
